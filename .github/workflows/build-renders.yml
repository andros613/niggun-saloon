name: Build Renders

# Triggered when a LilyPond source file changes.
# Recompiles the affected niggun and uploads outputs to the "renders" GitHub Release.
#
# NOTE: This workflow requires LilyPond, FluidSynth, FFmpeg, and LAME on the runner.
# The `apt-get install` step covers Ubuntu/Debian. Adjust if using a different runner.
#
# For key/tempo variants, this workflow will call build_variants.py (to be written)
# which generates all 7-key × 3-tempo combinations before uploading.

on:
  push:
    branches: [main]
    paths:
      - 'data/**/*.ly'
  workflow_dispatch:
    inputs:
      dir:
        description: 'Specific niggun directory to rebuild (e.g. niggun-012-avinu-malkeinu), or leave blank for all'
        required: false

permissions:
  contents: write   # needed to upload Release assets

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LilyPond, FluidSynth, FFmpeg, LAME
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lilypond fluidsynth ffmpeg lame

      - name: Detect changed niggun directories
        id: changed
        run: |
          if [ -n "${{ github.event.inputs.dir }}" ]; then
            echo "dirs=${{ github.event.inputs.dir }}" >> "$GITHUB_OUTPUT"
          else
            # Find all data/ dirs containing .ly files changed in this push
            dirs=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
              | grep '^data/' | awk -F/ '{print $2}' | sort -u | tr '\n' ' ')
            echo "dirs=$dirs" >> "$GITHUB_OUTPUT"
          fi

      - name: Build renders for changed directories
        run: |
          for dir in ${{ steps.changed.outputs.dirs }}; do
            if [ -f "data/$dir/run.sh" ]; then
              echo "Building $dir..."
              cd "data/$dir"
              bash run.sh
              cd ../..
            fi
          done

      - name: Upload renders to GitHub Release
        # Uploads MP3/PDF/MIDI to the "renders-latest" Release so the website
        # can serve them via CDN without storing large binaries in git.
        # The Release is created if it doesn't exist yet.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Ensure the release exists
          gh release view renders-latest --json id 2>/dev/null || \
            gh release create renders-latest \
              --title "Rendered Audio & Sheet Music" \
              --notes "Auto-generated by build-renders workflow. Contains MP3, PDF, MIDI files." \
              --prerelease

          for dir in ${{ steps.changed.outputs.dirs }}; do
            for ext in mp3 pdf midi mid; do
              for f in data/$dir/*.$ext; do
                [ -f "$f" ] && gh release upload renders-latest "$f" --clobber
              done
            done
          done

      - name: Rebuild metadata and trigger site deploy
        run: |
          python tools/build_metadata.py
          python tools/build_catalog.py
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/**/metadata.json catalog.json
          git diff --staged --quiet || git commit -m "chore: rebuild metadata and catalog [skip ci]"
          git push
