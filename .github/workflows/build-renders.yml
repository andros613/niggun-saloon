name: Build Renders

# Triggered when a LilyPond source file changes.
# Recompiles the affected niggun and commits rendered assets (MP3/PDF/MIDI) to
# web/public/assets/ so they are served by GitHub Pages with correct headers.
#
# NOTE: LilyPond is installed from GitLab releases (version pinned via LILYPOND_VERSION env var).
# FluidSynth, FFmpeg, and LAME come from apt. To upgrade LilyPond, update LILYPOND_VERSION.
#
# For key/tempo variants, this workflow will call build_variants.py (to be written)
# which generates all 7-key × 3-tempo combinations.

on:
  push:
    branches: [main]
    paths:
      - 'data/**/*.ly'
  workflow_dispatch:
    inputs:
      dir:
        description: 'Specific niggun directory to rebuild (e.g. niggun-012-avinu-malkeinu), or leave blank for all'
        required: false

permissions:
  contents: write   # needed to commit rendered assets back to repo

env:
  LILYPOND_VERSION: "2.24.4"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LilyPond ${{ env.LILYPOND_VERSION }} from GitLab releases
        run: |
          wget -q "https://gitlab.com/lilypond/lilypond/-/releases/v${LILYPOND_VERSION}/downloads/lilypond-${LILYPOND_VERSION}-linux-x86_64.tar.gz"
          tar -xzf "lilypond-${LILYPOND_VERSION}-linux-x86_64.tar.gz"
          echo "$PWD/lilypond-${LILYPOND_VERSION}/bin" >> $GITHUB_PATH

      - name: Install FluidSynth, FFmpeg, LAME, soundfont
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fluidsynth ffmpeg lame fluid-soundfont-gm

      - name: Detect changed niggun directories
        id: changed
        run: |
          if [ -n "${{ github.event.inputs.dir }}" ]; then
            echo "dirs=${{ github.event.inputs.dir }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # No dir specified — rebuild all dirs with a .ly file
            dirs=$(find data -name '*.ly' | awk -F/ '{print $2}' | sort -u | tr '\n' ' ')
            echo "dirs=$dirs" >> "$GITHUB_OUTPUT"
          else
            # Find all data/ dirs containing .ly files changed in this push
            dirs=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
              | grep '^data/' | awk -F/ '{print $2}' | sort -u | tr '\n' ' ')
            echo "dirs=$dirs" >> "$GITHUB_OUTPUT"
          fi

      - name: Build renders for changed directories
        env:
          NIGGUN_SF: /usr/share/sounds/sf2/FluidR3_GM.sf2
        run: |
          for dir in ${{ steps.changed.outputs.dirs }}; do
            if [ -f "data/$dir/run.sh" ]; then
              echo "Building $dir..."
              cd "data/$dir"
              bash run.sh
              cd ../..
            fi
          done

      - name: Copy rendered assets to web/public/assets/
        run: |
          for dir in ${{ steps.changed.outputs.dirs }}; do
            dest="web/public/assets/$dir"
            mkdir -p "$dest"
            find "data/$dir" -maxdepth 1 \( -name "*.mp3" -o -name "*.pdf" -o -name "*.midi" -o -name "*.mid" -o -name "*.ly" \) \
              -exec cp {} "$dest/" \;
          done

      - name: Rebuild metadata and commit assets + catalog
        run: |
          python3 tools/build_metadata.py
          python3 tools/build_catalog.py
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/assets/ data/**/metadata.json catalog.json
          git diff --staged --quiet || git commit -m "chore: rebuild renders and catalog"
          git push
