name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'catalog.json'
      - 'data/**/metadata.json'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress if a new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rebuild catalog.json from metadata files
        run: python tools/build_catalog.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Copy audio/PDF/MIDI assets into public/
        # Assets will eventually come from GitHub Releases CDN.
        # For now, copy them from the data/ tree so the site works immediately.
        # Large repos should replace this step with Release asset URL injection.
        run: |
          mkdir -p web/public/assets
          for dir in data/*/; do
            name=$(basename "$dir")
            dest="web/public/assets/$name"
            mkdir -p "$dest"
            find "$dir" -maxdepth 1 \( -name "*.mp3" -o -name "*.pdf" -o -name "*.midi" -o -name "*.mid" \) \
              -exec cp {} "$dest/" \;
          done

      - name: Build Astro site
        run: npm run build
        working-directory: web

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
